AWSTemplateFormatVersion: "2010-09-09"
Description: "Baseline resources for vision-web-workspace AWS Mac Builder. This template does not allocate EC2 Mac Dedicated Hosts or launch instances."

Parameters:
  Environment:
    Type: String
    Default: "dev"
    AllowedPattern: "^[a-z0-9-]+$"
  ProjectName:
    Type: String
    Default: "vision-web-workspace"
  ArtifactRetentionDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 365
  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365]

Resources:
  ArtifactKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${ProjectName} ${Environment} Mac Builder artifact key"
      EnableKeyRotation: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Role
          Value: mac-builder-baseline

  ArtifactKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectName}-${Environment}-mac-builder-artifacts"
      TargetKeyId: !Ref ArtifactKey

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt ArtifactKey.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: expire-mac-builder-artifacts
            Status: Enabled
            ExpirationInDays: !Ref ArtifactRetentionDays
            NoncurrentVersionExpiration:
              NoncurrentDays: !Ref ArtifactRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Role
          Value: mac-builder-artifacts

  BuilderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/${ProjectName}/${Environment}/mac-builder"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Role
          Value: mac-builder-logs

  BuilderInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-mac-builder-instance"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: mac-builder-artifacts-and-logs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt ArtifactKey.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Resource: !Sub "${BuilderLogGroup.Arn}:*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Role
          Value: mac-builder-instance-role

  BuilderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ProjectName}-${Environment}-mac-builder"
      Roles:
        - !Ref BuilderInstanceRole

Outputs:
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
  ArtifactKeyArn:
    Value: !GetAtt ArtifactKey.Arn
  BuilderLogGroupName:
    Value: !Ref BuilderLogGroup
  BuilderInstanceProfileName:
    Value: !Ref BuilderInstanceProfile
